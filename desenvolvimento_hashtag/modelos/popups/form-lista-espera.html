<style>
  :root {

  .elementor-popup-modal {

  /* Popup */

  .popup-form--spinner {
    & .container-spinner {
      display: block;
    }

    & .container-form {
      display: none;
    }

    & a {
      display: none !important;
    }
  }

  .container-spinner {
    display: none;
  }

  .popup-aberto {
    overflow-y: hidden;
  }

  .popup-aberto .popup {
    opacity: 1;
    pointer-events: auto;
    visibility: visible;
    transform: translatex(0);
  }

  .popup-aberto--spinner .form {
    display: none;
  }

  .popup-aberto--spinner .popup-container {
    border: none;
    width: auto;
    background-color: var(--cor-spinner);
  }

  .popup-aberto--spinner .popup-spinner {
    display: block;
  }

  .popup-container {
    position: relative;

    color: var(--branco);
    font-family: inherit;
    max-width: 100%;

  }

</style>

      if (document.querySelector(selector)) {
        return resolve(document.querySelector(selector));

      const observer = new MutationObserver((mutations) => {
        if (document.querySelector(selector)) {
          observer.disconnect();
          resolve(document.querySelector(selector));
        }
      });

      // If you get "parameter 1 is not of type 'Node'" error, see https://stackoverflow.com/a/77855838/492336
      observer.observe(document.body, {
        childList: true,
        subtree: true,

    });

      ["05", new Date("June 9 2025 GMT-0300")],
      ["06", new Date("October 13 2025 GMT-0300")],
    ],
    ing: [
      ["03", new Date("March 31 2025 GMT-0300")],
      ["04", new Date("May 19 2025 GMT-0300")],
      ["05", new Date("July 14 2025 GMT-0300")],
      ["06", new Date("October 6 2025 GMT-0300")],
    ],
    python: [
      ["22", new Date("April 7 2025 GMT-0300")],
      ["23", new Date("June 2 2025 GMT-0300")],
      ["24", new Date("September 8 2025 GMT-0300")],
      ["25", new Date("October 13 2025 GMT-0300")],
    ],
    pbi: [
      ["23", new Date("February 17 2025 GMT-0300")],
      ["24", new Date("July 14 2025 GMT-0300")],
      ["25", new Date("September 15 2025 GMT-0300")],
      ["26", new Date("December 15 2025 GMT-0300")],
    ],
    excel: [
      ["38", new Date("February 3 2025 GMT-0300")],
      ["39", new Date("February 3 2026 GMT-0300")],
    ],
  };

  dictUTMCampaign = {
    python: "programacao",
    excel: "treinamento",
    pbi: "treinamento",
    ad: "treinamento",
    cd: "programacao",
    ia: "treinamento",
    vit: "vitalicio",
    ing: "idioma",
  };

  // Atualizar SCK se tiver algum parâmetro na URL
  if (parametroSCK) {
    sckPadrao = parametroSCK;

    console.log(`Tem SCK na URL, sck=${sckPadrao}`);
  } else {
    var dataHoje = new Date();

    if (parametroUTMContent) {
      sckPadrao = "utm_content=" + parametroUTMContent;
    } else {
      sckPadrao = "utm_content=pg-vendas";
    }

    if (parametroConversion) {
      sckPadrao += "&conversion=" + parametroConversion;
    } else if (["intensivao", "jornada"].includes(fontePagina)) {
      if (dictTabelaLancamentos[nomeCurso]) {
        var tabelaLancamentoCurso = dictTabelaLancamentos[nomeCurso];
        var mesAnoConversion = gerarMesAno(tabelaLancamentoCurso[0][1]);

        tabelaLancamentoCurso.forEach((listaCurso) => {
          var data = listaCurso[1];
          var lancamento = listaCurso[0];

          // console.log(data);

          if (dataHoje.getTime() > data.getTime() + 1000 * 60 * 60 * 24 * 8) {
            mesAnoConversion = gerarMesAno(data);
            // console.log(mesAnoConversion);

            nLancamento = lancamento;
          }
        });

        sckPadrao += `&conversion=lcto-${
          listaSrc[fontePagina] +
          listaCodigos[nomeCurso] +
          nLancamento +
          "-" +
          mesAnoConversion
        }`;

        console.log(`Conversion de fonte Intensivão ou Jornada`);
      }
    } else if (fontePagina === "aula") {
      sckPadrao += `&conversion=perpetuo-${
        listaSrc[fontePagina] + listaCodigos[nomeCurso]
      }`;

      console.log(`Conversion de fonte=aula`);
    } else {
      var mesAnoConversion = gerarMesAno(dataHoje);

      sckPadrao += `&conversion=perpetuo-${
        listaSrc[fontePagina] + listaCodigos[nomeCurso]
      }-${mesAnoConversion}`;
      console.log(`Conversion de fonte diferente de Intensivão e Jornada`);
    }

    if (parametroUTMCampaign) {
      sckPadrao += "&utm_campaign=" + parametroUTMCampaign;
    } else if (dictUTMCampaign[nomeCurso]) {
      sckPadrao += `&utm_campaign=${dictUTMCampaign[nomeCurso]}`;
    }

    console.log(
      `Não tem UTM Content e Conversion, nem SCK na URL, sck=${sckPadrao}`
    );
  }

  if (parametroUTMSource) {
    sckPadrao += "&utm_source=" + parametroUTMSource;
  }

  if (parametroUTMMedium) {
    sckPadrao += "&utm_medium=" + parametroUTMMedium;
  }

  if (parametroUTMTerm) {
    sckPadrao += "&utm_term=" + parametroUTMTerm;
  }

  var srcPadrao = listaSrc[fontePagina] + listaCodigos[nomeCurso];

  // Atualizar SRC se tiver algum parâmetro na URL
  if (parametroSRC) {
    srcPadrao = parametroSRC;
  }

  if (tipoPagina) {
    srcPadrao += "_" + tipoPagina;
  }

  waitForElm(".form").then((elm) => {
    console.log("Formulário apareceu");

    if (typeof atualizarOrigens === "function") {
      atualizarOrigens();
    }

    definirLinkCheckout();
    dataLayerPushTagManager("AbriuForm");
  });

  // Funções para validar o formulário
  var isRequired = (value) => (value === "" ? false : true);

  var isEmailValid = (email) => {
    var re =
      /^(([^<>()\[\]\\.,;:\s@"]+(\.[^<>()\[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/;
    return re.test(email);
  };

  var showError = (input, message) => {
    var formField = input.parentElement;

    formField.classList.remove("sucesso");
    formField.classList.add("erro");

    var erro = formField.querySelector("small");
    erro.textContent = message;
  };

  var showSuccess = (input) => {
    var formField = input.parentElement;

    formField.classList.remove("erro");
    formField.classList.add("sucesso");

    var error = formField.querySelector("small");
    error.textContent = "";
  };

  var checkfullname = () => {
    let valid = false;
    var fullname = fullnameForm.value.trim();

    if (!isRequired(fullname)) {
      showError(fullnameForm, "Seu nome não pode ser vazio.");
    } else {
      showSuccess(fullnameForm);
      valid = true;
    }
    return valid;
  };

  var checkEmail = () => {
    let valid = false;
    var email = emailForm.value.trim();

    if (!isRequired(email)) {
      showError(emailForm, "Seu e-mail não pode ser vazio.");
    } else if (!isEmailValid(email)) {
      showError(emailForm, "O e-mail digitado não é válido.");
    } else {
      showSuccess(emailForm);
      valid = true;
    }
    return valid;
  };

  var debounce = (fn, delay = 500) => {
    let timeoutId;
    return (...args) => {
      if (timeoutId) {
        clearTimeout(timeoutId);
      }
      timeoutId = setTimeout(() => {
        fn.apply(null, args);
      }, delay);
    };
  };

  formActive.addEventListener(
    "input",
    debounce(function (e) {
      switch (e.target.id) {
        case "fullname":
          checkfullname();
          break;
        case "email":
          checkEmail();
          break;
      }
    })
  );

  formActive.addEventListener("submit", function (e) {
    e.preventDefault();

    checarEnvioFormulario();
  });
</script>

<script>
  // Script para preencher o formulário de pre-checkout com os parâmetros da URL
  function editarValorCampoForm(elemsForm, valorForm) {
    elemsForm.forEach(function (element) {
      element.value = valorForm;
    });
  }

  var elemsFormFullname = document.querySelectorAll("#fullname");
  var elemsFormEmail = document.querySelectorAll("#email");
  var elemsFormDDD = document.querySelectorAll("[id='field[59]']");
  var elemsFormCelular = document.querySelectorAll("[id='field[60]']");

  var parametrosURLCheckout = new URLSearchParams(window.location.search);

  var valorFirstname = parametrosURLCheckout.get("firstname");
  var valorFullname = parametrosURLCheckout.get("fullname");
  var valorEmail = parametrosURLCheckout.get("email");
  var valorDDD = parametrosURLCheckout.get("ddd");
  var valorCelular = parametrosURLCheckout.get("celular");
  var valorPhone = parametrosURLCheckout.get("phone");

  if (valorFullname) {
    editarValorCampoForm(elemsFormFullname, valorFullname);
  } else if (valorFirstname) {
    editarValorCampoForm(elemsFormFullname, valorFirstname);
  }

  if (valorEmail) {
    editarValorCampoForm(elemsFormEmail, valorEmail);
  }

  if (valorDDD && valorCelular) {
    editarValorCampoForm(elemsFormDDD, valorDDD);
    editarValorCampoForm(elemsFormCelular, valorCelular);
  } else if (valorPhone) {
    editarValorCampoForm(elemsFormDDD, valorPhone.substring(0, 2));
    editarValorCampoForm(elemsFormCelular, valorPhone.substring(2));
  }
</script>
